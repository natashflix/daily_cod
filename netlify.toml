# Netlify: статичный хостинг игры «Бассейн 21».
# Собираем отдельную папку dist, куда кладём игру как index.html —
# так корень сайта отдаёт именно уточку, а старая игра (public/index.html)
# на сайт не попадает. Единый источник игры — public/basseyn.html.
[build]
  command = "mkdir -p dist && cp public/basseyn.html dist/index.html"
  publish = "dist"
