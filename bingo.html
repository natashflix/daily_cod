<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Бинго — Школа 21</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #0a0a0a;
            color: #00ff88;
            font-family: 'Courier New', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px;
            user-select: none;
        }

        h1 {
            font-size: 2.4rem;
            text-align: center;
            letter-spacing: 8px;
            text-shadow: 0 0 24px #00ff88, 0 0 48px #00ff8844;
            margin-bottom: 4px;
        }

        .subtitle {
            color: #444;
            font-size: 0.78rem;
            letter-spacing: 3px;
            margin-bottom: 8px;
        }

        .tip {
            color: #333;
            font-size: 0.7rem;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .bingo-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }

        .bingo-letters {
            display: flex;
            gap: 2px;
        }

        .bingo-letter {
            width: 108px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 12px #00ff88;
            letter-spacing: 2px;
        }

        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(5, 108px);
            grid-template-rows: repeat(5, 108px);
            gap: 2px;
        }

        .cell {
            width: 108px;
            height: 108px;
            background: #0f0f0f;
            border: 1px solid #1c1c1c;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 0.69rem;
            line-height: 1.45;
            padding: 8px 6px;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s, color 0.15s;
            color: #aaa;
            word-break: break-word;
            hyphens: auto;
        }

        .cell:hover:not(.free) {
            border-color: #00ff8866;
            background: #0d1f16;
            color: #eee;
        }

        .cell.marked {
            background: #0a2e1a;
            border-color: #00ff88;
            color: #00ff88;
            text-shadow: 0 0 8px #00ff8866;
        }

        .cell.free {
            background: #061a0e;
            border-color: #00ff88;
            color: #00ff88;
            font-weight: bold;
            font-size: 1rem;
            letter-spacing: 2px;
            text-shadow: 0 0 16px #00ff88;
            cursor: default;
        }

        .cell.win {
            background: #00ff88 !important;
            border-color: #00ff88 !important;
            color: #000 !important;
            font-weight: bold;
            text-shadow: none !important;
            animation: glow 0.6s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: inset 0 0 8px rgba(0,0,0,0.2); }
            to   { box-shadow: inset 0 0 20px rgba(0,0,0,0.4), 0 0 16px #00ff88; }
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            background: transparent;
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 9px 22px;
            font-family: 'Courier New', monospace;
            font-size: 0.78rem;
            cursor: pointer;
            letter-spacing: 2px;
            transition: background 0.15s, color 0.15s;
        }

        button:hover {
            background: #00ff88;
            color: #000;
        }

        .counter {
            color: #333;
            font-size: 0.7rem;
            margin-top: 12px;
            letter-spacing: 2px;
        }

        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 50;
            align-items: center;
            justify-content: center;
        }

        .overlay.show {
            display: flex;
        }

        .win-box {
            background: #050505;
            border: 1px solid #00ff88;
            box-shadow: 0 0 60px rgba(0,255,136,0.3);
            padding: 40px 56px;
            text-align: center;
            max-width: 360px;
        }

        .win-box h2 {
            font-size: 2rem;
            color: #00ff88;
            letter-spacing: 4px;
            margin-bottom: 12px;
            text-shadow: 0 0 20px #00ff88;
        }

        .win-box p {
            color: #555;
            font-size: 0.8rem;
            margin-bottom: 24px;
            letter-spacing: 1px;
        }

        @media (max-width: 580px) {
            .bingo-grid {
                grid-template-columns: repeat(5, 64px);
                grid-template-rows: repeat(5, 64px);
            }
            .bingo-letter { width: 64px; font-size: 1rem; }
            .cell { width: 64px; height: 64px; font-size: 0.55rem; padding: 4px; }
            .cell.free { font-size: 0.7rem; letter-spacing: 1px; }
            h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

<h1>BINGO</h1>
<div class="subtitle">// ШКОЛА 21 — P2P EDITION //</div>
<div class="tip">кликай на клетку когда слышишь / видишь</div>

<div class="bingo-wrap">
    <div class="bingo-letters">
        <div class="bingo-letter">B</div>
        <div class="bingo-letter">I</div>
        <div class="bingo-letter">N</div>
        <div class="bingo-letter">G</div>
        <div class="bingo-letter">O</div>
    </div>
    <div class="bingo-grid" id="grid"></div>
</div>

<div class="controls">
    <button onclick="newCard()">// новая карточка</button>
    <button onclick="resetMarks()">// сброс отметок</button>
</div>

<div class="counter" id="counter">отмечено: 1 / 25</div>

<div class="overlay" id="overlay">
    <div class="win-box">
        <h2>БИНГО!</h2>
        <p>ты пережил очередной p2p.<br>время пить четвёртый кофе.</p>
        <button onclick="closeOverlay()">// продолжить страдать</button>
    </div>
</div>

<script>
    // 30 фраз — карточка случайно выбирает 24 из них (+ FREE в центре)
    // ~80% клеток совпадает между разными карточками
    const PHRASES = [
        "Segmentation\nfault",
        "Забыл ;",
        "Git merge\nconflict",
        '"У меня\nработало"',
        "Спал\n< 4 часов",
        "Выпил\n3 кофе",
        "Нашёл ответ\nв man",
        "Потерял\nветку",
        "ADM сделал\nзамечание",
        "Сдал\nпроект",
        "Забыл\npush",
        "Компилятор\nругается",
        '"Что такое\nуказатель?"',
        "Попросил\nпомощь",
        '"Это C89?"',
        "Дедлайн\nчерез час",
        "Код заработал\nслучайно",
        '"Это\nлегко"',
        "Поймал\nwarning",
        "Исправил\nwarning",
        "Нашёл\nбутылку",
        "Увидел\nбутылку",
        '"Ты зарубил\nна мастер"',
        "Peer\nreview",
        "Memory\nleak",
        "Valgrind\nплачет",
        "-Wall\n-Wextra\n-Werror",
        '"А где\nтесты?"',
        '"Ты читал\nзадание?"',
        "Зависло\nнамертво",
    ];

    const FREE_INDEX = 12;

    let cells = [];
    let marked = new Set();

    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    function newCard() {
        const picked = shuffle(PHRASES).slice(0, 24);
        picked.splice(FREE_INDEX, 0, null); // null = FREE cell
        cells = picked;
        marked = new Set([FREE_INDEX]);
        closeOverlay();
        render();
    }

    function resetMarks() {
        marked = new Set([FREE_INDEX]);
        closeOverlay();
        render();
    }

    function toggle(i) {
        if (i === FREE_INDEX) return;
        marked.has(i) ? marked.delete(i) : marked.add(i);
        const won = checkWin();
        render(won);
        if (won.size > 0) {
            document.getElementById('overlay').classList.add('show');
        }
    }

    const LINES = (() => {
        const lines = [];
        for (let r = 0; r < 5; r++) lines.push([0,1,2,3,4].map(c => r*5+c));
        for (let c = 0; c < 5; c++) lines.push([0,1,2,3,4].map(r => r*5+c));
        lines.push([0,6,12,18,24]);
        lines.push([4,8,12,16,20]);
        return lines;
    })();

    function checkWin() {
        const winCells = new Set();
        for (const line of LINES) {
            if (line.every(i => marked.has(i))) {
                line.forEach(i => winCells.add(i));
            }
        }
        return winCells;
    }

    function render(winCells = new Set()) {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';

        cells.forEach((text, i) => {
            const div = document.createElement('div');
            div.className = 'cell';

            if (i === FREE_INDEX) {
                div.classList.add('free', 'marked');
                div.textContent = 'FREE';
            } else {
                div.innerHTML = text.replace(/\n/g, '<br>');
                if (marked.has(i))  div.classList.add('marked');
                if (winCells.has(i)) div.classList.add('win');
                div.onclick = () => toggle(i);
            }

            grid.appendChild(div);
        });

        document.getElementById('counter').textContent =
            `отмечено: ${marked.size} / 25`;
    }

    function closeOverlay() {
        document.getElementById('overlay').classList.remove('show');
    }

    newCard();
</script>
</body>
</html>
